<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>index-n2</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      // FOUC avoidance: apply the resolved theme class to <html> before React
      // mounts. Source of truth is ~/.index-n2/settings.json (fetched
      // async by SettingsContext); this `theme` key is a write-only cache
      // maintained by theme-provider.tsx so we can bridge the network RTT at
      // page load without a flash. Falls back to OS preference when no cache.
      //
      // KEEP IN SYNC WITH `src/components/theme-provider.tsx`.
      // Shared contract: valid values ("light" | "dark" | "system"),
      // localStorage key ("theme"), and the matchMedia resolution for
      // "system". Duplication is structural — this script runs before any
      // JS bundle loads and cannot import from the module graph.
      try {
        var t = localStorage.getItem("theme");
        var pref = t === "light" || t === "dark" || t === "system" ? t : "system";
        var resolved = pref === "system"
          ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : pref;
        document.documentElement.classList.add(resolved);
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
